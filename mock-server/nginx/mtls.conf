# mTLS terminator for the mock stack. Terminates TLS and proxies to go-httpbin.
#   :8443  client certificate REQUIRED (mTLS)
#   :8444  TLS only, no client cert (for testing a custom CA on its own)

server {
    listen 8443 ssl;
    server_name localhost;

    ssl_certificate     /certs/server.pem;
    ssl_certificate_key /certs/server.key;

    # Require a client cert signed by our mock CA.
    ssl_client_certificate /certs/ca.pem;
    ssl_verify_client on;

    location / {
        proxy_pass http://httpbin:8080;
        proxy_set_header Host $host;
        # Surface the verification result in the echoed response headers.
        proxy_set_header X-Client-Verify $ssl_client_verify;
        proxy_set_header X-Client-DN $ssl_client_s_dn;
    }
}

server {
    listen 8444 ssl;
    server_name localhost;

    ssl_certificate     /certs/server.pem;
    ssl_certificate_key /certs/server.key;
    ssl_verify_client off;

    location / {
        proxy_pass http://httpbin:8080;
        proxy_set_header Host $host;
    }
}
