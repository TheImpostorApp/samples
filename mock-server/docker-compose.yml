name: impostor-mock

# A one-command mock backend for testing & demoing Impostor. See README.md for the
# endpoint → feature map. Bring up: `docker compose up -d` (or `docker-compose`).

services:
  # REST methods/status/headers, gzip/brotli/deflate, redirects, cookies, delays,
  # Basic/Bearer auth, WebSocket echo, SSE.
  httpbin:
    image: mccutchen/go-httpbin:2.18.3
    ports: ["8080:8080"]
    restart: unless-stopped

  # OAuth2 / OIDC: client-credentials + authorization-code/PKCE.
  oauth:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    ports: ["8081:8080"]
    environment:
      # Bind inside the container; issuer is derived from the request host.
      SERVER_PORT: "8080"
    restart: unless-stopped

  # gRPC test service with reflection + all four call types (9000 plaintext, 9001 TLS).
  grpcbin:
    image: moul/grpcbin:latest
    ports: ["9000:9000", "9001:9001"]
    restart: unless-stopped

  # One-shot: generate the throwaway CA/server/client certs into ./certs, then exit.
  certinit:
    image: alpine/openssl:latest
    entrypoint: ["/bin/sh", "/certs/gen-certs.sh"]
    volumes:
      - ./certs:/certs

  # mTLS terminator → proxies to httpbin. Waits for certs to be generated.
  mtls:
    image: nginx:alpine
    depends_on:
      certinit:
        condition: service_completed_successfully
    ports: ["8443:8443", "8444:8444"]
    volumes:
      - ./certs:/certs:ro
      - ./nginx/mtls.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
